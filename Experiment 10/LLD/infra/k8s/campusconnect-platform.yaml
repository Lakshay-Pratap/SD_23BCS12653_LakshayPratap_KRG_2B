apiVersion: v1
kind: Namespace
metadata:
  name: campusconnect
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: campusconnect-config
  namespace: campusconnect
data:
  API_GATEWAY_PORT: "4000"
  NEXT_PUBLIC_API_GATEWAY_URL: "https://api.campusconnect.example"
  AUTH_SERVICE_URL: "http://auth-service:4101"
  USER_SERVICE_URL: "http://user-service:4102"
  CHAT_SERVICE_URL: "http://chat-service:4103"
  MATCHING_SERVICE_URL: "http://matching-service:4104"
  MODERATION_SERVICE_URL: "http://moderation-service:4105"
  RECOMMENDATION_SERVICE_URL: "http://recommendation-service:4106"
  NOTIFICATION_SERVICE_URL: "http://notification-service:4107"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: campusconnect
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/your-org/campusconnect-api-gateway:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: campusconnect-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: campusconnect
spec:
  selector:
    app: api-gateway
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: campusconnect
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/campusconnect-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: campusconnect-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: campusconnect
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
---

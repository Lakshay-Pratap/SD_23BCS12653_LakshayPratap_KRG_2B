version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campusconnect
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: campus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env.example
    ports:
      - "4101:4101"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    env_file: .env.example
    ports:
      - "4102:4102"

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    env_file: .env.example
    ports:
      - "4103:4103"

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    env_file: .env.example
    ports:
      - "4104:4104"

  moderation-service:
    build:
      context: .
      dockerfile: services/moderation-service/Dockerfile
    env_file: .env.example
    ports:
      - "4105:4105"

  recommendation-service:
    build:
      context: .
      dockerfile: services/recommendation-service/Dockerfile
    env_file: .env.example
    ports:
      - "4106:4106"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    env_file: .env.example
    ports:
      - "4107:4107"

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    env_file: .env.example
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - user-service
      - chat-service
      - matching-service
      - moderation-service
      - recommendation-service
      - notification-service

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.example
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
  mongo-data:
